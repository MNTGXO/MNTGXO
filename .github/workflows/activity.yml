name: Update README with activity

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update README
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: JamesIves/github-activity-readme@v0.4.1
        with:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
